backend:
  name: github
  repo: stellar-images/stellar-images-site
  branch: main
  base_url: https://stellar-images-site.vercel.app
  auth_endpoint: api/auth
  # Keep GitHub OAuth secrets in Vercel Environment Variables, never in this public file.

local_backend: true
media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: site_settings
    label: Site Settings
    delete: false
    editor:
      preview: false
    files:
      - name: site
        label: Site Settings
        file: src/content/site.json
        format: json
        fields:
          - label: Business Name
            name: businessName
            widget: string
            hint: Public brand name shown in the header and footer.
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Site URL, name: siteUrl, widget: string, hint: Use the final production domain after launch. }
              - { label: Default Browser Title, name: defaultTitle, widget: string }
              - { label: Default Description, name: defaultDescription, widget: text, hint: Short search/social description. Aim for one clear sentence. }
              - { label: Social Share Image, name: socialImage, widget: image, hint: Used for link previews when someone shares the site. }
              - { label: Hide From Search Engines Until Launch, name: noIndex, widget: boolean, default: true, hint: Keep enabled while placeholder content is visible. Turn off only at final launch. }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, hint: Small all-caps text above the homepage headline. }
              - { label: Heading, name: heading, widget: string, hint: Main homepage headline. Keep this strong and concise. }
              - { label: Description, name: description, widget: text, hint: One or two sentences below the headline. }
              - label: Image
                name: image
                widget: object
                fields:
                  - { label: Image, name: src, widget: image, hint: Wide hero image. Horizontal photos work best. }
                  - { label: Alt Text, name: alt, widget: string, hint: Describe the image for accessibility. }
          - label: About Preview
            name: aboutPreview
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Paragraphs
                name: paragraphs
                widget: list
                field: { label: Paragraph, name: paragraph, widget: text }
          - label: About Image
            name: aboutImage
            widget: object
            fields:
              - { label: Image, name: src, widget: image }
              - { label: Alt Text, name: alt, widget: string }
              - { label: Caption Title, name: captionTitle, widget: string }
              - { label: Caption Text, name: captionText, widget: text }
          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Intro Text, name: intro, widget: text }
              - { label: Phone, name: phone, widget: string }
              - { label: Email, name: email, widget: string }
              - { label: Hours, name: hours, widget: string }
              - label: Service Area
                name: serviceArea
                widget: list
                field: { label: Area, name: area, widget: string }
          - label: Booking
            name: booking
            widget: object
            fields:
              - { label: Public Calendly Event URL, name: calendlyUrl, widget: string, required: false, hint: Paste the public booking page URL clients should use. Do not paste API keys, tokens, or private dashboard URLs. }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Description, name: description, widget: text }

      - name: form_config
        label: Booking Form
        file: src/content/form-config.json
        format: json
        fields:
          - { label: Intro, name: intro, widget: text }
          - { label: Note, name: note, widget: text }
          - { label: Submit Label, name: submitLabel, widget: string }
          - label: Fields
            name: fields
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: "Advanced: Field Key", name: name, widget: string, hint: Internal form key used by the website and email payload. Do not change unless the workflow is intentionally changing. }
              - { label: Label, name: label, widget: string, hint: Text clients see above the input. }
              - { label: "Advanced: Input Type", name: type, widget: select, options: ["text", "email", "tel", "number", "select", "textarea", "checkbox-group"], hint: Controls how the browser renders the field. Do not change unless the field behavior needs to change. }
              - { label: Required, name: required, widget: boolean, default: false }
              - { label: Placeholder, name: placeholder, widget: string, required: false }
              - { label: Default Value, name: defaultValue, widget: string, required: false, hint: Optional default value, mostly useful for select fields like State = SC. }
              - label: Options
                name: options
                widget: list
                required: false
                field: { label: Option, name: option, widget: string }

  - name: page_content
    label: Page Content
    delete: false
    editor:
      preview: false
    files:
      - name: pages
        label: Page Copy
        file: src/content/pages.json
        format: json
        fields:
          - label: Home Page
            name: home
            widget: object
            fields:
              - label: About Section
                name: aboutSection
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Services Section
                name: servicesSection
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
              - label: Portfolio Section
                name: portfolioSection
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
                  - { label: Link Label, name: linkLabel, widget: string }
              - label: Testimonials Section
                name: testimonialsSection
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
              - label: Credentials Section
                name: credentialsSection
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
              - label: CTA
                name: cta
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Primary Button Label, name: primaryLabel, widget: string }
                  - { label: Secondary Button Label, name: secondaryLabel, widget: string }
          - label: Portfolio Page
            name: portfolio
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: CTA
                name: cta
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Primary Button Label, name: primaryLabel, widget: string }
                  - { label: Secondary Button Label, name: secondaryLabel, widget: string }
          - label: Services Page
            name: services
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Overview Section
                name: overview
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
              - label: CTA
                name: cta
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Primary Button Label, name: primaryLabel, widget: string }
                  - { label: Secondary Button Label, name: secondaryLabel, widget: string }
          - label: About Page
            name: about
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Credentials Section
                name: credentialsSection
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
              - label: CTA
                name: cta
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Primary Button Label, name: primaryLabel, widget: string }
                  - { label: Secondary Button Label, name: secondaryLabel, widget: string }
          - label: Contact Page
            name: contact
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Description, name: description, widget: text }

  - name: services
    label: Services
    delete: false
    editor:
      preview: false
    files:
      - name: services
        label: Services
        file: src/content/services.json
        format: json
        fields:
          - label: Services
            name: services
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "Advanced: URL Anchor Slug", name: slug, widget: string, hint: Used for page anchors and links. Keep lowercase with hyphens and avoid changing after launch. }
              - { label: Short Label, name: shortLabel, widget: string }
              - { label: Name, name: name, widget: string }
              - { label: Short Description, name: shortDescription, widget: text }
              - { label: Long Description, name: longDescription, widget: text }
              - { label: Starting Price, name: startingPrice, widget: string }
              - { label: Icon, name: icon, widget: select, options: ["PH", "DR", "VD"], hint: PH = photos, DR = drone, VD = video. }
              - label: Features
                name: features
                widget: list
                field: { label: Feature, name: feature, widget: string }
              - label: Pricing Rows
                name: pricingRows
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Price, name: price, widget: string }

  - name: portfolio
    label: Portfolio
    delete: false
    editor:
      preview: false
    files:
      - name: portfolio
        label: Portfolio
        file: src/content/portfolio.json
        format: json
        fields:
          - label: Portfolio Items
            name: portfolio
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Advanced: Card ID", name: id, widget: string, hint: Unique internal card ID. Keep lowercase with hyphens and avoid changing after launch. }
              - { label: Title, name: title, widget: string }
              - { label: Category, name: category, widget: select, options: ["Interior", "Exterior", "Drone", "Video"] }
              - { label: Image, name: image, widget: image, hint: Upload compressed JPG or WebP photos when real portfolio assets are ready. }
              - { label: Alt Text, name: alt, widget: string, hint: Plain-language description of the photo. }
              - { label: Location, name: location, widget: string }
              - { label: Featured, name: featured, widget: boolean, default: false, hint: Featured items appear on the homepage. }

  - name: testimonials
    label: Testimonials
    delete: false
    editor:
      preview: false
    files:
      - name: testimonials
        label: Testimonials
        file: src/content/testimonials.json
        format: json
        fields:
          - label: Testimonials
            name: testimonials
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Stars, name: stars, widget: number, value_type: int, min: 1, max: 5 }

  - name: credentials
    label: Credentials
    delete: false
    editor:
      preview: false
    files:
      - name: credentials
        label: Credentials
        file: src/content/credentials.json
        format: json
        fields:
          - label: Credentials
            name: credentials
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Icon, name: icon, widget: select, options: ["PRO", "FAA", "PPL", "NAV"], hint: PRO = professional, FAA = drone pilot, PPL = private pilot, NAV = Navy veteran. }
